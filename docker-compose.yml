version: '3.8'

services:
  # PostgreSQL Datenbank
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: novarix_db
      POSTGRES_USER: novarix_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novarix_user -d novarix_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Novarix Backend
  backend:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://novarix_user:${DB_PASSWORD:?DB_PASSWORD must be set}@postgres:5432/novarix_db?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5000}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      ADMIN_EMAIL: ${ADMIN_EMAIL:-maxnodes@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      ADMIN_NAME: ${ADMIN_NAME:-Max}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
    driver: local
